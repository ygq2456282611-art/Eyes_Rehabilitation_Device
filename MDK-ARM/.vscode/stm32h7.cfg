# STM32H723 ST-Link OpenOCD Configuration
# 这个配置文件用于通过ST-Link调试器连接到STM32H723芯片

# 接口配置 - 使用ST-Link
interface stlink

# 传输层 - SWD接口（Serial Wire Debug）
transport select swd

# 目标芯片配置
set CHIPNAME STM32H723VG
set CPUTAPID 0x6ba02477

# 包含STM32通用配置
source [find target/stm32h7x.cfg]

# 可选：禁用内存写保护
# 取消下面的注释来禁用保护
# stm32h7x disable_dbgmcu

# 连接到目标
init

# 复位并暂停
reset halt

# 可选：验证连接
# idcode
